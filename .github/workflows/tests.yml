name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=tokenkeeper --cov-report=term-missing

      - name: Verify import works without optional deps
        run: |
          # 测试：没装 openai/anthropic 时也能 import
          # 用 isolated venv 避免污染
          python -m venv .test_venv
          .test_venv/bin/python -m pip install -e .
          if [ "$RUNNER_OS" = "Windows" ]; then
            .test_venv/Scripts/python.exe -c "from tokenkeeper import guard; print('✅ 优雅启动 OK (无 openai/anthropic)')"
          else
            .test_venv/bin/python -c "from tokenkeeper import guard; print('✅ 优雅启动 OK (无 openai/anthropic)')"
          fi
          rm -rf .test_venv  # 清理（Windows 用 Remove-Item，这里简单用 rm 跨平台）

  lint:
    name: Lint with flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - name: flake8
        run: |
          # 只检查语法和明显错误，不强制风格
          flake8 tokenkeeper/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # 复杂 lint 留给 ruff / black（未来）
